---
- name: civa multi-server bootstrap
  hosts: civa_targets
  become: true
  gather_facts: true

  roles:
    - role: civa.bootstrap.bootstrap
      tags:
        - always
    - role: civa.system_update.system_update
      tags:
        - system_update
    - role: civa.user_management.user_management
      tags:
        - user_management
    - role: civa.ssh_hardening.ssh_hardening
      tags:
        - ssh_hardening
    - role: civa.security_firewall.security_firewall
      tags:
        - security_firewall
    - role: civa.system_config.system_config
      tags:
        - system_config
    - role: civa.dependencies.dependencies
      tags:
        - dependencies
    - role: civa.containerization.containerization
      tags:
        - containerization
    - role: civa.traefik.traefik
      tags:
        - traefik
    - role: civa.nginx.nginx
      tags:
        - nginx
    - role: civa.caddy.caddy
      tags:
        - caddy
