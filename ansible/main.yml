  hosts: civa_targets
  become: true
  gather_facts: true
  roles:
    - role: bootstrap
      tags:
        - always
        - bootstrap
    - role: system_update
      tags:
        - system_update
    - role: user_management
      tags:
        - user_management
    - role: ssh_hardening
      tags:
        - ssh_hardening
    - role: security_firewall
      tags:
        - security_firewall
    - role: system_config
      tags:
        - system_config
    - role: system_dependencies
